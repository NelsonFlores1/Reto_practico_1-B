name: Automatización Resiliente con Latencia Aleatoria

on:
  push:
    branches: [ main ]

jobs:
  run-automation-suite:
    name: Ejecución de Pruebas y Reporte
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. Instalar dependencias de pruebas
        run: |
          npm ci
          npx playwright install --with-deps

      - name: 4. Levantar aplicación con Docker
        run: |
          cd src/app
          docker compose up --build -d

      - name: 5. Esperar a que localhost esté disponible
        run: |
          npx wait-on http://localhost:3000

      - name: 6. Ejecutar prueba en modo headless
        run: |
          npx playwright test tests/registro-async.spec.js --repeat-each=3

      - name: 7. Subir reporte Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/